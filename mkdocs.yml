site_name: Fluxo de Caixa Diário
site_description: Desafio técnico para a vaga de Arquiteto de Soluções
docs_dir: docs
site_dir: site
dev_addr: 127.0.0.1:8000
watch:
  - docs

theme:
  name: material
  language: pt
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Modo claro

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - abbr
  - pymdownx.snippets:
      base_path:
        - docs
      auto_append:
        - includes/abbreviations.md
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: pt
  - tags:
      tags_file: tags.md
  - minify:
      minify_html: true

nav:
  - Início: index.md
  - Visão Executiva: visao-executiva.md
  - Planejamento do Projeto: planejamento.md

  - Negócio:
    - Drivers e Stakeholders: negocio/drivers.md
    - Principles Catalog: negocio/principios.md
    - Domínios, Value Stream e Capacidades: negocio/dominios.md
    - Requisitos: negocio/requisitos.md

  - Engenharia:
    - Ferramentas e Stack: stack.md
    - Contratos de Integração: engenharia/contratos.md
    - Plano de Entrega Incremental: engenharia/plano-entregas.md
    - Arquitetura de Transição: engenharia/transicao.md
    - Topologia Local (docker-compose): infraestrutura/topologia.md

  - Decisões do Sistema:
    - Índice: adr/index.md
    - ADR-001 — Padrão Arquitetural: adr/ADR-001-padrao-arquitetural.md
    - ADR-002 — Message Broker: adr/ADR-002-message-broker.md
    - ADR-003 — Outbox Pattern: adr/ADR-003-outbox-pattern.md
    - ADR-004 — JWT e JWKS: adr/ADR-004-jwt-validacao-local.md
    - ADR-005 — Protocolo Interno REST vs gRPC: adr/ADR-005-protocolo-comunicacao-interna.md
    - ADR-006 — Container Runtime: adr/ADR-006-container-runtime.md
    - ADR-007 — API Gateway Traefik: adr/ADR-007-api-gateway.md

  - Nuvem (AWS):
    - Visão Geral: cloud/index.md
    - Estimativa de Custos: cloud/custos.md
    - Decisões de Nuvem:
      - Índice: cloud/adrs.md
      - ADR-008 — Cloud Provider: adr/ADR-008-cloud-provider.md
      - ADR-009 — API Gateway de Produção: adr/ADR-009-api-gateway-producao.md
      - ADR-010 — Segurança em Profundidade: adr/ADR-010-seguranca.md
      - ADR-011 — Excelência Operacional: adr/ADR-011-excelencia-operacional.md

  - Glossário: glossario.md
  - Tags: tags.md
