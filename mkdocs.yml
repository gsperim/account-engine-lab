site_name: Fluxo de Caixa Diário
site_description: Desafio técnico para a vaga de Arquiteto de Soluções
site_url: https://gsperim.github.io/account-engine-lab/
docs_dir: docs
site_dir: site
dev_addr: 127.0.0.1:8000
repo_url: https://github.com/gsperim/account-engine-lab
repo_name: account-engine-lab
edit_uri: edit/main/docs/
watch:
  - docs

theme:
  name: material
  language: pt
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections

    - navigation.top
    - navigation.path
    - navigation.footer
    - navigation.prune
    - toc.follow
    - header.autohide
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Modo claro

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - abbr
  - pymdownx.snippets:
      base_path:
        - docs
      auto_append:
        - includes/abbreviations.md
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: pt
  - tags:
      tags_file: tags.md
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - panzoom:
      full_screen: true
  - minify:
      minify_html: true

nav:
  - Início: index.md
  - Visão Executiva: visao-executiva.md

  - Negócio:
    - Drivers e Stakeholders: negocio/drivers.md
    - Principles Catalog: negocio/principios.md
    - Domínios e Value Stream: negocio/dominios.md
    - Requisitos: negocio/requisitos.md

  - Arquitetura:
    - Diagramas C4: arquitetura/diagramas-c4.md
    - Contratos de Integração: engenharia/contratos.md
    - Dados e Persistência: arquitetura/dados.md
    - Stack e Ferramentas: stack.md
    - Decisões Arquiteturais: adr/index.md

  - Segurança:
    - Visão Geral: seguranca/index.md
    - OWASP ASVS: seguranca/asvs.md
    - Continuidade Operacional: seguranca/continuidade.md
    - Conformidade e Evidências: seguranca/conformidade.md

  - Observabilidade: observabilidade/index.md

  - Implementação:
    - Visão Geral: implementacao/index.md
    - Chaos Engineering: implementacao/caos.md

  - Infraestrutura:
    - Local — docker-compose: infraestrutura/topologia.md
    - Cloud AWS:
      - Visão Geral: cloud/index.md
      - Custos: cloud/custos.md
    - Pipeline CI/CD: infraestrutura/pipeline.md

  - Planejamento:
    - Visão do Projeto: planejamento.md
    - Plano de Entrega: engenharia/plano-entregas.md
    - Arquitetura de Transição: engenharia/transicao.md

  - Glossário: glossario.md
  - Tags: tags.md
