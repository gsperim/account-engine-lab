site_name: Fluxo de Caixa Diário — Banco Carrefour
site_description: Desafio técnico para a vaga de Arquiteto de Soluções
docs_dir: .
site_dir: site

theme:
  name: material
  language: pt
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Modo claro

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: pt
  - minify:
      minify_html: true

exclude_docs: |
  CLAUDE.md
  .venv/
  site/
  __pycache__/

nav:
  - Início: docs/index.md
  - Base de Conhecimento:
    - Desafio: base-de-conhecimento/desafio-arquiteto-solucoes.md
    - Roteiro: base-de-conhecimento/roteiro.md
  - Decisões Arquiteturais:
    - Índice: docs/adr/index.md
    - ADR-001 — Ferramentas de Documentação: docs/adr/ADR-001-ferramentas-documentacao-arquitetural.md
    - ADR-002 — MkDocs Material: docs/adr/ADR-002-mkdocs-portal-documentacao.md
    - ADR-003 — ArchiMate 3.x: docs/adr/ADR-003-archimate-notacao-arquitetural.md
