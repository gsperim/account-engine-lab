site_name: Fluxo de Caixa Diário
site_description: Desafio técnico para a vaga de Arquiteto de Soluções
docs_dir: docs
site_dir: site
dev_addr: 127.0.0.1:8000
watch:
  - docs

theme:
  name: material
  language: pt
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Modo claro

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: pt
  - minify:
      minify_html: true

nav:
  - Início: index.md
  - Planejamento do Projeto: planejamento.md
  - Negócio:
    - Visão Executiva: negocio/visao-executiva.md
    - Drivers e Stakeholders: negocio/drivers.md
    - Principles Catalog: negocio/principios.md
    - Domínios, Value Stream e Capacidades: negocio/dominios.md
    - Glossário: negocio/glossario.md
    - Requisitos: negocio/requisitos.md
  - Ferramentas e Stack: stack.md
  - Decisões Arquiteturais: adr/index.md
