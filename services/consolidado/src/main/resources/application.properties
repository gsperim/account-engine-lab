spring.application.name=consolidado
server.port=8080

# ── Datasource ─────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/consolidado_dev}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:consolidado}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:consolidado_dev}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ─────────────────────────────────────────────────────────────────────
spring.flyway.locations=classpath:db/migration

# ── RabbitMQ ───────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:fluxocaixa}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:fluxocaixa_dev}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.listener.simple.prefetch=10
spring.rabbitmq.listener.simple.observation-enabled=true

# ── Redis ──────────────────────────────────────────────────────────────────────
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.type=redis

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ── Tracing / OTEL ─────────────────────────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

# ── Virtual Threads (Project Loom — ADR-018) ───────────────────────────────────
spring.threads.virtual.enabled=true

# ── Resilience4j — Consumer RabbitMQ ──────────────────────────────────────────
resilience4j.circuitbreaker.instances.rabbit-consumer.sliding-window-size=10
resilience4j.circuitbreaker.instances.rabbit-consumer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rabbit-consumer.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.rabbit-consumer.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.rabbit-consumer.register-health-indicator=true

# ── Redis — Timeout (age como TimeLimiter para operações de cache) ─────────────
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=200ms

# ── Logging estruturado ────────────────────────────────────────────────────────
# Formato Logstash JSON: campos level, message, traceId, spanId — compatível com Promtail/Loki
logging.structured.format.console=logstash
logging.level.br.com.carrefour=INFO
logging.level.org.springframework.amqp=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.data.redis=WARN

# ── OAuth2 / JWT — Resource Server ─────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/fluxocaixa/protocol/openid-connect/certs}

# ── Reconciliação — Gateway para serviço de Lançamentos ────────────────────────
# Em produção: substituir service-token por Client Credentials do Keycloak.
reconciliacao.lancamentos.base-url=${RECONCILIACAO_LANCAMENTOS_BASE_URL:http://localhost:8080}
reconciliacao.lancamentos.service-token=${RECONCILIACAO_SERVICE_TOKEN:changeme}

# ── Resilience4j — Gateway de Lançamentos (reconciliação e reconstrução) ────────
resilience4j.retry.instances.lancamentos-gateway.max-attempts=3
resilience4j.retry.instances.lancamentos-gateway.wait-duration=2s
resilience4j.retry.instances.lancamentos-gateway.enable-exponential-backoff=true
resilience4j.retry.instances.lancamentos-gateway.exponential-backoff-multiplier=2

resilience4j.circuitbreaker.instances.lancamentos-gateway.sliding-window-size=5
resilience4j.circuitbreaker.instances.lancamentos-gateway.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.lancamentos-gateway.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.lancamentos-gateway.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.lancamentos-gateway.register-health-indicator=true

# ── Métricas — Histogramas de latência HTTP ────────────────────────────────────
management.metrics.distribution.percentiles-histogram.http.server.requests=true
