spring.application.name=lancamentos
server.port=8080

# ── Datasource ─────────────────────────────────────────────────────────────────
# Default: dev local fora do Docker. Em container, SPRING_DATASOURCE_* sobrescreve.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lancamentos_dev}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lancamentos}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lancamentos_dev}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ─────────────────────────────────────────────────────────────────────
spring.flyway.locations=classpath:db/migration

# ── RabbitMQ ───────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:fluxocaixa}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:fluxocaixa_dev}
spring.rabbitmq.virtual-host=/

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ── Tracing / OTEL ─────────────────────────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

# ── Virtual Threads (Project Loom — ADR-018) ───────────────────────────────────
spring.threads.virtual.enabled=true

# ── Resilience4j — Publisher RabbitMQ ─────────────────────────────────────────
resilience4j.retry.instances.rabbit-publisher.max-attempts=3
resilience4j.retry.instances.rabbit-publisher.wait-duration=1s
resilience4j.retry.instances.rabbit-publisher.enable-exponential-backoff=true
resilience4j.retry.instances.rabbit-publisher.exponential-backoff-multiplier=2
resilience4j.retry.instances.rabbit-publisher.retry-exceptions=org.springframework.amqp.AmqpException,java.io.IOException

resilience4j.circuitbreaker.instances.rabbit-publisher.sliding-window-size=10
resilience4j.circuitbreaker.instances.rabbit-publisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rabbit-publisher.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.rabbit-publisher.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.rabbit-publisher.register-health-indicator=true

# ── Logging estruturado ────────────────────────────────────────────────────────
# Formato Logstash JSON: campos level, message, traceId, spanId — compatível com Promtail/Loki
logging.structured.format.console=logstash
logging.level.br.com.carrefour=INFO
logging.level.org.springframework.amqp=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN

# ── OAuth2 / JWT — Resource Server ─────────────────────────────────────────────
# jwk-set-uri: busca chaves públicas do Keycloak para validação de assinatura JWT.
# Em Docker: sobrescrito por KEYCLOAK_JWKS_URI (http://gw-keycloak:8080/...).
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/fluxocaixa/protocol/openid-connect/certs}

# ── Métricas — Histogramas de latência HTTP ────────────────────────────────────
management.metrics.distribution.percentiles-histogram.http.server.requests=true
