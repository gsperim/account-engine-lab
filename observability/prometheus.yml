global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:

  # ── Própria stack de observabilidade ──────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]

  - job_name: grafana
    static_configs:
      - targets: [grafana:3000]

  - job_name: loki
    static_configs:
      - targets: [loki:3100]
    metrics_path: /metrics

  - job_name: tempo
    static_configs:
      - targets: [tempo:3200]
    metrics_path: /metrics

  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]

  # ── Infraestrutura de aplicação ────────────────────────────────────────────
  - job_name: traefik
    static_configs:
      - targets: [traefik:8082]

  - job_name: rabbitmq
    static_configs:
      - targets: [rabbitmq:15692]

  - job_name: keycloak
    static_configs:
      - targets: [keycloak:9000]
    metrics_path: /metrics

  - job_name: postgres-lancamentos
    static_configs:
      - targets: [postgres-exporter-lancamentos:9187]

  - job_name: postgres-consolidado
    static_configs:
      - targets: [postgres-exporter-consolidado:9187]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]

  # ── Blackbox — probes sintéticos externos ─────────────────────────────────
  - job_name: blackbox
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # Gateway
          - http://traefik:8080/ping
          - http://keycloak:9000/health/ready
          # Observabilidade
          - http://grafana:3000/api/health
          - http://prometheus:9090/-/healthy
          - http://loki:3100/ready
          - http://tempo:3200/ready
          # Dados (15692 = metrics plugin, sem auth)
          - http://rabbitmq:15692/metrics
          # Etapa 7 — serviços de aplicação
          # - http://lancamentos:8080/health/live
          # - http://consolidado:8080/health/live
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # ── Serviços de aplicação (Etapa 7) ───────────────────────────────────────
  # - job_name: lancamentos
  #   static_configs:
  #     - targets: [lancamentos:8080]
  #   metrics_path: /metrics

  # - job_name: consolidado
  #   static_configs:
  #     - targets: [consolidado:8080]
  #   metrics_path: /metrics
