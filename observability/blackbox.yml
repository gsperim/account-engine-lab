modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: [HTTP/1.1, HTTP/2.0]
      valid_status_codes: []   # padrão: 2xx
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      fail_if_ssl: false
      fail_if_not_ssl: false

  http_post_200:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: [HTTP/1.1, HTTP/2.0]
      valid_status_codes: [200, 201]
      method: POST
      preferred_ip_protocol: ip4
