global:
  resolve_timeout: 5m

# ── Roteamento ─────────────────────────────────────────────────────────────────
# Receiver padrão: null (descarta silenciosamente em dev sem Telegram configurado)
# Para ativar Telegram: preencha a seção abaixo e mude receiver padrão para
# "telegram-warning" (e rotas para telegram-critical/telegram-info).

route:
  group_by: [alertname, service, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "null"
  routes:
    - matchers: [severity="critical"]
      receiver: "null"
      group_wait: 10s
      repeat_interval: 1h
    - matchers: [severity="warning"]
      receiver: "null"

# ── Receiver null ───────────────────────────────────────────────────────────────
receivers:
  - name: "null"

# ── Telegram (dev) — descomentar após configurar bot ───────────────────────────
# Setup:
#   1. Fale com @BotFather no Telegram → /newbot → copie o token
#   2. Adicione o bot ao grupo/canal desejado
#   3. Acesse: https://api.telegram.org/bot<TOKEN>/getUpdates
#      para obter o chat_id (campo "id" dentro de "chat") — é um INTEIRO
#   4. Edite este arquivo: coloque o token e chat_id reais nas linhas abaixo
#   5. Mude o receiver padrão na seção route acima para "telegram-warning"
