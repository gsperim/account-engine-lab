#         ⚠️ <b>{{ .GroupLabels.alertname }}</b>
#         {{ range .Alerts -}}
#         <b>Serviço:</b> {{ .Labels.service }}
#         {{ .Annotations.summary }}
#         {{ if .Annotations.description }}<i>{{ .Annotations.description }}</i>{{ end }}
#         {{- end }}
#       send_resolved: true
#
