# - name: pagerduty
#   pagerduty_configs:
#     - routing_key: ${PAGERDUTY_INTEGRATION_KEY}
#       severity: critical
#       client: Fluxo de Caixa

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, service]
