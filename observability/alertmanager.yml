global:
  resolve_timeout: 5m

# ── Ambiente: DEV (Telegram) ───────────────────────────────────────────────
# Para produção, substituir os receivers por Slack + PagerDuty:
#   receivers: slack-critical (SLACK_WEBHOOK_URL) + pagerduty (PAGERDUTY_KEY)
#
# Setup rápido do bot Telegram:
#   1. Fale com @BotFather no Telegram → /newbot → copie o token
#   2. Adicione o bot ao grupo/canal desejado
#   3. Acesse: https://api.telegram.org/bot<TOKEN>/getUpdates
#      para obter o chat_id (campo "id" dentro de "chat")
#   4. Defina TELEGRAM_BOT_TOKEN e TELEGRAM_CHAT_ID no .env

route:
  group_by: [alertname, service, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: telegram-info
  routes:
    - matchers: [severity="critical"]
      receiver: telegram-critical
      group_wait: 10s
      repeat_interval: 1h
    - matchers: [severity="warning"]
      receiver: telegram-warning

receivers:
  - name: telegram-info
    telegram_configs:
      - api_url: https://api.telegram.org
        bot_token: ${TELEGRAM_BOT_TOKEN}
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: HTML
        message: |
          ℹ️ <b>{{ .GroupLabels.alertname }}</b>
          {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
        send_resolved: true

  - name: telegram-warning
    telegram_configs:
      - api_url: https://api.telegram.org
        bot_token: ${TELEGRAM_BOT_TOKEN}
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: HTML
        message: |
          ⚠️ <b>{{ .GroupLabels.alertname }}</b>
          {{ range .Alerts -}}
          <b>Serviço:</b> {{ .Labels.service }}
          {{ .Annotations.summary }}
          {{ if .Annotations.description }}<i>{{ .Annotations.description }}</i>{{ end }}
          {{- end }}
        send_resolved: true

  - name: telegram-critical
    telegram_configs:
      - api_url: https://api.telegram.org
        bot_token: ${TELEGRAM_BOT_TOKEN}
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: HTML
        message: |
          🔴 <b>CRÍTICO — {{ .GroupLabels.alertname }}</b>
          {{ range .Alerts -}}
          <b>Serviço:</b> {{ .Labels.service }}
          <b>SLO:</b> {{ .Labels.slo }}
          {{ .Annotations.summary }}
          {{ if .Annotations.description }}<i>{{ .Annotations.description }}</i>{{ end }}
          {{- end }}
        send_resolved: true

  # ── Produção ─────────────────────────────────────────────────────────────
  # Descomentar e configurar as variáveis de ambiente correspondentes
  # - name: slack-critical
  #   slack_configs:
  #     - api_url: ${SLACK_WEBHOOK_URL}
  #       channel: '#alertas-infra'
  #       title: ':fire: [CRITICAL] {{ .GroupLabels.alertname }}'
  #       color: danger
  #       send_resolved: true
  #
  # - name: pagerduty
  #   pagerduty_configs:
  #     - routing_key: ${PAGERDUTY_INTEGRATION_KEY}
  #       severity: critical
  #       client: Fluxo de Caixa

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, service]
