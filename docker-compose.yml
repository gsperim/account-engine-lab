services:

  # ── Traefik — API Gateway ──────────────────────────────────────────────────
  # Roteamento, TLS, rate limiting e (Etapa 7) validação JWT via plugin
  # Descoberta de serviços via labels — sem arquivo de config de rotas separado
  # ADR-007: traefik sobre nginx
  traefik:
    container_name: gw-traefik
    image: traefik:v3.0
    entrypoint: ["/usr/local/bin/traefik"]  # bypass entrypoint.sh (shell script musl incompatível com kernel 6.17)
    command: --configfile=/etc/traefik/traefik.yml
    ports:
      - "${GATEWAY_HTTP_PORT:-8090}:80"    # HTTP
      - "${GATEWAY_HTTPS_PORT:-8443}:443"  # HTTPS (cert auto-assinado em local)
      - "8091:8080"                        # Dashboard Traefik (dev)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/certs:ro  # certs gerados por mkcert; fallback para auto-assinado se vazio
    networks:
      - gateway-services
    restart: unless-stopped

  # ── Serviço de Lançamentos ─────────────────────────────────────────────────
  # build implementado na Etapa 7 — sobe com: docker compose --profile app up
  lancamentos:
    container_name: app-lancamentos
    profiles: [app]
    build:
      context: .
      dockerfile: services/lancamentos/Dockerfile
      target: runtime
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=desafio-carrefour_gateway-services"
      # Rota HTTP
      - "traefik.http.routers.lancamentos.rule=PathPrefix(`/lancamentos`)"
      - "traefik.http.routers.lancamentos.entrypoints=web,websecure"
      - "traefik.http.routers.lancamentos.middlewares=strip-lancamentos@file,secure-headers@file"
      # TLS
      - "traefik.http.routers.lancamentos.tls=true"
      - "traefik.http.services.lancamentos.loadbalancer.server.port=8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://data-postgres-lancamentos:5432/${POSTGRES_LANCAMENTOS_DB:-lancamentos_dev}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_LANCAMENTOS_USER:-lancamentos}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_LANCAMENTOS_PASSWORD:-lancamentos_dev}"
      SPRING_RABBITMQ_HOST: "data-rabbitmq"
      SPRING_RABBITMQ_USERNAME: "${RABBITMQ_USER:-fluxocaixa}"
      SPRING_RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-fluxocaixa_dev}"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: "http://obs-otel-collector:4318/v1/traces"
      KEYCLOAK_JWKS_URI: "http://gw-keycloak:8080/realms/fluxocaixa/protocol/openid-connect/certs"
    networks:
      - gateway-services
      - lancamentos-data
      - messaging
    depends_on:
      postgres-lancamentos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # distroless não tem shell/curl — health é gerido por HTTP probe no Kubernetes
      # (/actuator/health). Em dev local o Traefik roteia sem depender de health status.
      disable: true
    restart: unless-stopped

  # ── Outbox Relay ───────────────────────────────────────────────────────────
  # Polling na tabela outbox do Lançamentos e publicação no RabbitMQ
  # Mesmo Dockerfile do lancamentos, entry point diferente (multi-stage)
  outbox-relay:
    container_name: app-outbox-relay
    profiles: [app]
    build:
      context: .
      dockerfile: services/lancamentos/Dockerfile
      target: outbox-relay
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-lancamentos:5432/${POSTGRES_LANCAMENTOS_DB:-lancamentos_dev}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_LANCAMENTOS_USER:-lancamentos}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_LANCAMENTOS_PASSWORD:-lancamentos_dev}"
      SPRING_RABBITMQ_HOST: "rabbitmq"
      SPRING_RABBITMQ_USERNAME: "${RABBITMQ_USER:-fluxocaixa}"
      SPRING_RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-fluxocaixa_dev}"
    networks:
      - lancamentos-data
      - messaging
    depends_on:
      postgres-lancamentos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Serviço de Consolidação Diária ─────────────────────────────────────────
  # Escalonável horizontalmente: docker-compose --profile app up --scale consolidado=3
  # build implementado na Etapa 7
  consolidado:
    container_name: app-consolidado
    profiles: [app]
    build:
      context: .
      dockerfile: services/consolidado/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=desafio-carrefour_gateway-services"
      # Rota HTTP + HTTPS
      - "traefik.http.routers.consolidado.rule=PathPrefix(`/consolidacao`)"
      - "traefik.http.routers.consolidado.entrypoints=web,websecure"
      - "traefik.http.routers.consolidado.middlewares=strip-consolidado@file,secure-headers@file"
      # TLS
      - "traefik.http.routers.consolidado.tls=true"
      - "traefik.http.services.consolidado.loadbalancer.server.port=8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://data-postgres-consolidado:5432/${POSTGRES_CONSOLIDADO_DB:-consolidado_dev}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_CONSOLIDADO_USER:-consolidado}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_CONSOLIDADO_PASSWORD:-consolidado_dev}"
      SPRING_RABBITMQ_HOST: "data-rabbitmq"
      SPRING_RABBITMQ_USERNAME: "${RABBITMQ_USER:-fluxocaixa}"
      SPRING_RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-fluxocaixa_dev}"
      SPRING_DATA_REDIS_HOST: "data-redis"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: "http://obs-otel-collector:4318/v1/traces"
      KEYCLOAK_JWKS_URI: "http://gw-keycloak:8080/realms/fluxocaixa/protocol/openid-connect/certs"
    networks:
      - gateway-services
      - consolidacao-data
      - messaging
    depends_on:
      postgres-consolidado:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  # ── PostgreSQL — Lançamentos ───────────────────────────────────────────────
  postgres-lancamentos:
    container_name: data-postgres-lancamentos
    image: postgres:16
    environment:
      POSTGRES_DB: "${POSTGRES_LANCAMENTOS_DB:-lancamentos}"
      POSTGRES_USER: "${POSTGRES_LANCAMENTOS_USER:-lancamentos}"
      POSTGRES_PASSWORD: "${POSTGRES_LANCAMENTOS_PASSWORD:-changeme}"
    volumes:
      - postgres-lancamentos-data:/var/lib/postgresql/data
    networks:
      - lancamentos-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_LANCAMENTOS_USER:-lancamentos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL — Consolidação ──────────────────────────────────────────────
  postgres-consolidado:
    container_name: data-postgres-consolidado
    image: postgres:16
    environment:
      POSTGRES_DB: "${POSTGRES_CONSOLIDADO_DB:-consolidado}"
      POSTGRES_USER: "${POSTGRES_CONSOLIDADO_USER:-consolidado}"
      POSTGRES_PASSWORD: "${POSTGRES_CONSOLIDADO_PASSWORD:-changeme}"
    volumes:
      - postgres-consolidado-data:/var/lib/postgresql/data
    networks:
      - consolidacao-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CONSOLIDADO_USER:-consolidado}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis — Cache de Saldos ────────────────────────────────────────────────
  # AOF: cache sobrevive a reinicializações
  # LRU: quando memória esgota, evicta as chaves menos recentes
  redis:
    container_name: data-redis
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - consolidacao-data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── RabbitMQ — Message Broker ──────────────────────────────────────────────
  # definitions.json pré-configura exchange, filas e DLQ
  rabbitmq:
    container_name: data-rabbitmq
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-guest}"
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions \"/etc/rabbitmq/definitions.json\""
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - messaging
      - observability
    ports:
      - "15672:15672"  # Management UI — apenas desenvolvimento local
      - "15692:15692"  # Prometheus metrics
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Observabilidade ────────────────────────────────────────────────────────
  # Stack PLT + OpenTelemetry (ADR-015)
  # Grafana:        http://localhost:3000
  # Prometheus:     http://localhost:9090
  # OTEL Collector: localhost:4317 (gRPC) / 4318 (HTTP)

  postgres-exporter-lancamentos:
    container_name: obs-pg-exporter-lancamentos
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_LANCAMENTOS_USER:-lancamentos}:${POSTGRES_LANCAMENTOS_PASSWORD}@postgres-lancamentos:5432/${POSTGRES_LANCAMENTOS_DB:-lancamentos}?sslmode=disable"
    networks:
      - lancamentos-data
      - observability
    restart: unless-stopped

  postgres-exporter-consolidado:
    container_name: obs-pg-exporter-consolidado
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_CONSOLIDADO_USER:-consolidado}:${POSTGRES_CONSOLIDADO_PASSWORD}@postgres-consolidado:5432/${POSTGRES_CONSOLIDADO_DB:-consolidado}?sslmode=disable"
    networks:
      - consolidacao-data
      - observability
    restart: unless-stopped

  redis-exporter:
    container_name: obs-redis-exporter
    image: oliver006/redis_exporter:v1.62.0
    environment:
      REDIS_ADDR: redis://redis:6379
    networks:
      - consolidacao-data
      - observability
    restart: unless-stopped

  alertmanager:
    container_name: obs-alertmanager
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-configure-in-.env}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-0}
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    networks:
      - observability
    restart: unless-stopped

  blackbox:
    container_name: obs-blackbox
    image: prom/blackbox-exporter:v0.25.0
    volumes:
      - ./observability/blackbox.yml:/etc/blackbox/config.yml:ro
    command: --config.file=/etc/blackbox/config.yml
    ports:
      - "9115:9115"
    networks:
      - gateway-services
      - observability
    restart: unless-stopped

  otel-collector:
    container_name: obs-otel-collector
    image: otel/opentelemetry-collector-contrib:0.113.0
    volumes:
      - ./observability/otel-collector.yml:/etc/otel/config.yml:ro
    command: ["--config=/etc/otel/config.yml"]
    ports:
      - "4317:4317"   # OTLP gRPC — serviços enviam traces/métricas/logs aqui
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # métricas do próprio collector (scrapeadas pelo Prometheus)
    networks:
      - gateway-services
      - observability
    restart: unless-stopped

  prometheus:
    container_name: obs-prometheus
    image: prom/prometheus:v3.1.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-rules.yml:/etc/prometheus/rules/rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    networks:
      - observability
      - gateway-services   # scrape keycloak:9000 e traefik:8082
    restart: unless-stopped

  promtail:
    container_name: obs-promtail
    image: grafana/promtail:3.3.0
    volumes:
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability
    depends_on:
      - loki
    restart: unless-stopped

  loki:
    container_name: obs-loki
    image: grafana/loki:3.3.0
    volumes:
      - ./observability/loki.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    networks:
      - observability
    restart: unless-stopped

  tempo:
    container_name: obs-tempo
    image: grafana/tempo:2.6.0
    volumes:
      - ./observability/tempo.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/config.yml
    ports:
      - "3200:3200"   # Tempo HTTP API
    networks:
      - observability
    restart: unless-stopped

  pyroscope:
    container_name: obs-pyroscope
    image: grafana/pyroscope:1.7.0
    volumes:
      - ./observability/pyroscope.yml:/etc/pyroscope/config.yml:ro
      - pyroscope-data:/var/lib/pyroscope
    command: ["--config.file=/etc/pyroscope/config.yml"]
    ports:
      - "4040:4040"
    networks:
      - observability
    restart: unless-stopped

  grafana:
    container_name: obs-grafana
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceToProfiles
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo
      - pyroscope
    restart: unless-stopped

  # ── Métricas do host ───────────────────────────────────────────────────────
  node-exporter:
    container_name: obs-node-exporter
    image: prom/node-exporter:v1.8.2
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|snap|boot)($|/)
    volumes:
      - /proc:/host/proc:ro,rslave
      - /sys:/host/sys:ro,rslave
      - /:/host/root:ro,rslave
    networks:
      - observability
    restart: unless-stopped

  # ── Identidade ─────────────────────────────────────────────────────────────
  # Keycloak — servidor OAuth2/OIDC (ADR-014)
  # Disponível em: http://localhost:8180  (admin: admin/admin em dev)
  # JWKS: http://localhost:8180/realms/fluxocaixa/protocol/openid-connect/certs
  keycloak:
    container_name: gw-keycloak
    image: quay.io/keycloak/keycloak:26.6.1
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD obrigatório}
      KC_DB: dev-file
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    command: start-dev --import-realm
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=desafio-carrefour_gateway-services"
      # Expõe apenas /auth/realms/* — admin console fica acessível só pela porta direta 8180.
      - "traefik.http.routers.keycloak.rule=PathPrefix(`/auth/realms`)"
      - "traefik.http.routers.keycloak.entrypoints=web,websecure"
      - "traefik.http.routers.keycloak.middlewares=strip-auth@file"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    ports:
      - "8180:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/realm-fluxocaixa.json:/opt/keycloak/data/import/realm-fluxocaixa.json:ro
    networks:
      - gateway-services
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.0\r\n\r\n' >&3 && grep -q UP <&3"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  portainer:
    container_name: dev-portainer
    image: portainer/portainer-ce:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    ports:
      - "9001:9000"   # UI web (9000 ocupado pelo Keycloak management no host ficaria conflitando)
    restart: unless-stopped

  # ── Ferramentas de Desenvolvimento ─────────────────────────────────────────
  docs:
    container_name: dev-docs
    build:
      context: .
      dockerfile: Dockerfile.docs
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    command: serve --dev-addr=0.0.0.0:8000 --watch docs --watch mkdocs.yml --livereload

  structurizr:
    container_name: dev-structurizr
    image: structurizr/structurizr
    user: "0"
    ports:
      - "8080:8080"
    volumes:
      - ./structurizr:/usr/local/structurizr
      - ./docs:/usr/local/structurizr/docs:ro
    command: local

# ── Redes ──────────────────────────────────────────────────────────────────
networks:
  gateway-services:
    driver: bridge

  observability:
    driver: bridge

  lancamentos-data:
    driver: bridge
    internal: true  # sem saída para internet

  consolidacao-data:
    driver: bridge
    internal: true  # sem saída para internet

  messaging:
    driver: bridge
    internal: true  # sem saída para internet

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres-lancamentos-data:
  postgres-consolidado-data:
  redis-data:
  rabbitmq-data:
  keycloak-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
  pyroscope-data:
  alertmanager-data:
  portainer-data:
