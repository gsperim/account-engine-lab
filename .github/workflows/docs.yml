name: Docs — GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'structurizr/**'
      - '.github/workflows/docs.yml'
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentação
    runs-on: ubuntu-latest
    # Quando disparado por workflow_run, só continua se o CI passou
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build MkDocs
        run: mkdocs build --verbose

      # ── Structurizr → HTML estático ─────────────────────────────────────────
      # structurizr/cli está descontinuado; site-generatr (avisi-cloud) é a
      # ferramenta mantida para gerar HTML estático a partir de workspace.dsl.
      # Monta apenas a pasta structurizr/ para excluir o symlink docs/ e manter
      # a exportação C4 separada da documentação MkDocs.
      - name: Exportar C4 — HTML estático (Structurizr)
        run: |
          mkdir -p /tmp/c4-model/build/site site/c4
          cp structurizr/workspace.dsl /tmp/c4-model/
          cp structurizr/workspace.json /tmp/c4-model/ 2>/dev/null || true
          cp structurizr/theme.json     /tmp/c4-model/ 2>/dev/null || true
          docker run --rm \
            -v "/tmp/c4-model:/var/model" \
            ghcr.io/avisi-cloud/structurizr-site-generatr:latest \
            generate-site -w workspace.dsl
          cp -r /tmp/c4-model/build/site/* site/c4/

      # ── Relatórios de testes (último CI verde em main) ──────────────────────
      - name: Baixar relatório — lancamentos
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: ci.yml
          branch: main
          name: test-results-lancamentos
          path: site/tests/lancamentos
          if_no_artifact_found: warn

      - name: Baixar relatório — consolidado
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: ci.yml
          branch: main
          name: test-results-consolidado
          path: site/tests/consolidado
          if_no_artifact_found: warn

      # ── Infracost (último CI verde em main) ─────────────────────────────────
      - name: Baixar relatório Infracost
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: ci.yml
          branch: main
          name: infracost-report
          path: site/infracost
          if_no_artifact_found: warn

      - name: Upload artefato para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Publicar no GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
