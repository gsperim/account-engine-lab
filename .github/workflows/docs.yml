name: Docs — GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write   # mike escreve na branch gh-pages

jobs:
  deploy:
    name: Build e publicar documentação
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo — mike usa git log para datas

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Configurar git para o deploy
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build e deploy para gh-pages
        run: mkdocs gh-deploy --force --clean --verbose
