name: CD — Release para ECR

on:
  push:
    branches: [main]

env:
  AWS_REGION: sa-east-1
  ECR_PREFIX: fluxo-caixa-production

jobs:
  release:
    name: Build e push para ECR
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: write   # criar GitHub Release
      id-token: write   # OIDC para aws-actions/configure-aws-credentials

    steps:
      - uses: actions/checkout@v4

      - name: Extrair versão do CLAUDE.md
        id: version
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "tag=$(date +'%Y%m%d')-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Configurar credenciais AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — lancamentos
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/lancamentos/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/lancamentos:${{ steps.version.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/lancamentos:latest

      - name: Build e push — consolidado
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/consolidado/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/consolidado:${{ steps.version.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/consolidado:latest

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Imagens publicadas

            | Serviço | Tag |
            |---------|-----|
            | lancamentos | `${{ steps.version.outputs.tag }}` |
            | consolidado | `${{ steps.version.outputs.tag }}` |

            Repositórios ECR: `${{ env.ECR_PREFIX }}/lancamentos` · `${{ env.ECR_PREFIX }}/consolidado`
